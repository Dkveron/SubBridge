name: Update Mihomo profile

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SubBridge
        uses: actions/checkout@v6
        with:
          path: subbridge

      - name: Checkout private config repository
        uses: actions/checkout@v6
        with:
          repository: Dkveron/SubBridge-config
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SubBridge
        working-directory: subbridge
        run: python -m pip install .

      - name: Generate Mihomo profile
        working-directory: subbridge
        env:
          LIBERTY_URL: ${{ secrets.LIBERTY_URL }}
        run: |
          subbridge convert \
            --provider liberty \
            --url "$LIBERTY_URL" \
            --output ../config-repo/liberty.yaml

      - name: Commit updated profile
        working-directory: config-repo
        run: |
          git config user.name "SubBridge Bot"
          git config user.email "subbridge-bot@users.noreply.github.com"
          git add liberty.yaml

          if git diff --cached --quiet; then
            echo "Profile has not changed"
            exit 0
          fi

          git commit -m "chore: update Liberty profile"
          git push
